<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>太阳系桌球 - 星球撞击沙盒</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; user-select: none; }
        canvas { display: block; touch-action: none; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.65);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            max-width: 330px;
            z-index: 10;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; color: #fff; }
        p { margin: 5px 0; font-size: 13px; line-height: 1.5; }
        .highlight { color: #4DA8DA; font-weight: bold; }
        .status { color: #00ff88; font-weight: bold; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;}
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>🎱 太阳系桌球沙盒</h1>
        <p>🖱️ <span class="highlight">左键按住星球拖动</span>：拉弓瞄准</p>
        <p>💥 <span class="highlight">松开左键</span>：发射星球撞击其他天体</p>
        <p>📷 <span class="highlight">右键拖动空白处</span>：旋转视角</p>
        <p>🔍 <span class="highlight">鼠标滚轮</span>：缩放距离</p>
        <p>🕳️ <span class="highlight">黑洞 → 白洞</span>：星球进入黑洞会从太阳对侧白洞弹出</p>
        <p>⚪ <span class="highlight">白洞斥力</span>：直射白洞会在远处被弹飞，无法靠近</p>
        <p>☀️ <span class="highlight">太阳焚烧</span>：星球触及太阳会被焚毁</p>
        <p class="status" id="sys-status">⏳ 正在初始化 3D 引擎...</p>
        <p style="color: #ffcc00; font-weight: bold; font-size: 12px;">(拉得越远力度越大，星球间碰撞如桌球)</p>
    </div>

    <script src="https://cdn.staticfile.net/three.js/r128/three.min.js"></script>
    <script src="https://cdn.staticfile.net/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        window.onload = function() {
            try {
                if (typeof THREE === 'undefined') throw new Error("Three.js 核心库未加载。");
                if (typeof CANNON === 'undefined') throw new Error("Cannon.js 物理引擎未加载。");
                if (typeof THREE.OrbitControls === 'undefined') throw new Error("OrbitControls 视角控制库未加载。");

                document.getElementById('sys-status').innerHTML = "✅ 状态：星球已就绪，选择一个星球开始发射吧！";

                // ==========================================
                // 场景初始化
                // ==========================================
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, 0.0008);

                const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
                camera.position.set(0, 180, 300);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.body.appendChild(renderer.domElement);

                // OrbitControls: 右键旋转, 中键平移
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.08;
                controls.mouseButtons = {
                    LEFT: null,
                    MIDDLE: THREE.MOUSE.PAN,
                    RIGHT: THREE.MOUSE.ROTATE
                };
                controls.touches = {
                    ONE: THREE.TOUCH.ROTATE,
                    TWO: THREE.TOUCH.DOLLY_PAN
                };

                // ==========================================
                // 物理世界
                // ==========================================
                const world = new CANNON.World();
                world.gravity.set(0, 0, 0);
                world.broadphase = new CANNON.NaiveBroadphase();
                world.solver.iterations = 15;

                const physicsMaterial = new CANNON.Material("standard");
                const contactMaterial = new CANNON.ContactMaterial(
                    physicsMaterial, physicsMaterial,
                    { friction: 0.05, restitution: 0.9 }
                );
                world.addContactMaterial(contactMaterial);

                // 太阳碰撞材质（被焚毁前可能有轻微接触）
                const sunMaterial = new CANNON.Material("sun");
                const sunContactMaterial = new CANNON.ContactMaterial(
                    physicsMaterial, sunMaterial,
                    { friction: 0.1, restitution: 0.2 }
                );
                world.addContactMaterial(sunContactMaterial);

                // ==========================================
                // 光照
                // ==========================================
                const ambientLight = new THREE.AmbientLight(0x444444);
                scene.add(ambientLight);
                const sunLight = new THREE.PointLight(0xffffff, 2.5, 1000);
                scene.add(sunLight);

                // ==========================================
                // 星空背景
                // ==========================================
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(6000 * 3);
                for (let i = 0; i < 6000 * 3; i++) starPos[i] = (Math.random() - 0.5) * 1800;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                const starMesh = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 }));
                scene.add(starMesh);

                // ==========================================
                // 全局变量
                // ==========================================
                const planets = [];
                const G = 12;
                const SUN_MASS = 1000;
                const SUN_RADIUS = 12;
                let sunBodyRef = null;
                let sunMeshRef = null;

                const ephemerisData = [
                    { name: "Mercury", color: 0xa8a8a8, radius: 0.8, dist: 25, orbitDays: 88 },
                    { name: "Venus",   color: 0xe0cda8, radius: 1.4, dist: 35, orbitDays: 224.7 },
                    { name: "Earth",   color: 0x4b90dd, radius: 1.5, dist: 50, orbitDays: 365.2 },
                    { name: "Mars",    color: 0xd14009, radius: 1.1, dist: 65, orbitDays: 687 },
                    { name: "Jupiter", color: 0xc88b3a, radius: 4.0, dist: 100, orbitDays: 4331 },
                    { name: "Saturn",  color: 0xe3d599, radius: 3.2, dist: 135, orbitDays: 10747 },
                    { name: "Uranus",  color: 0x66ccff, radius: 2.2, dist: 170, orbitDays: 30589 },
                    { name: "Neptune", color: 0x3333ff, radius: 2.1, dist: 200, orbitDays: 59800 }
                ];

                // ==========================================
                // 创建天体
                // ==========================================
                function createBody(name, radius, dist, angle, color, isSun) {
                    const geo = new THREE.SphereGeometry(radius, 48, 48);
                    const mat = new THREE.MeshStandardMaterial({
                        color: color, roughness: 0.4, metalness: 0.15,
                        emissive: isSun ? color : 0x000000,
                        emissiveIntensity: isSun ? 1.2 : 0
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    scene.add(mesh);

                    if (isSun) {
                        const corona = new THREE.Mesh(
                            new THREE.SphereGeometry(radius * 1.45, 32, 32),
                            new THREE.MeshBasicMaterial({
                                color: 0xff6600, transparent: true, opacity: 0.28, side: THREE.BackSide
                            })
                        );
                        mesh.add(corona);

                        const flare = new THREE.Mesh(
                            new THREE.SphereGeometry(radius * 1.15, 24, 24),
                            new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.5 })
                        );
                        mesh.add(flare);
                    }

                    const mass = isSun ? 0 : radius * 8;
                    const bodyMat = isSun ? sunMaterial : physicsMaterial;
                    const body = new CANNON.Body({
                        mass: mass,
                        material: bodyMat,
                        linearDamping: isSun ? 0 : 0,
                        angularDamping: isSun ? 0 : 0.05
                    });
                    body.addShape(new CANNON.Sphere(radius));

                    const x = dist * Math.cos(angle);
                    const z = dist * Math.sin(angle);
                    body.position.set(x, 0, z);

                    const planetEntry = { name, mesh, body, isSun, baseColor: color, orbitDist: dist };

                    if (!isSun) {
                        const speed = Math.sqrt((G * SUN_MASS) / dist);
                        const vx = -speed * Math.sin(angle);
                        const vz = speed * Math.cos(angle);
                        body.velocity.set(vx, 0, vz);
                        planetEntry.orbitAngle = angle;
                        planetEntry.orbitSpeed = speed / dist;
                        planetEntry.orbitMode = true;
                        body.type = CANNON.Body.KINEMATIC;
                    } else {
                        sunBodyRef = body;
                        sunMeshRef = mesh;
                    }

                    world.addBody(body);
                    planets.push(planetEntry);

                    if (!isSun) {
                        const orbitGeo = new THREE.RingGeometry(dist - 0.15, dist + 0.15, 80);
                        const orbitMat = new THREE.MeshBasicMaterial({
                            color: 0xffffff, transparent: true, opacity: 0.12, side: THREE.DoubleSide
                        });
                        const orbitMesh = new THREE.Mesh(orbitGeo, orbitMat);
                        orbitMesh.rotation.x = Math.PI / 2;
                        scene.add(orbitMesh);
                    }
                }

                function initSolarSystem() {
                    createBody("Sun", SUN_RADIUS, 0, 0, 0xffcc00, true);
                    const now = Date.now();
                    const daysSinceEpoch = now / (1000 * 60 * 60 * 24);
                    ephemerisData.forEach(p => {
                        const currentAngle = (daysSinceEpoch % p.orbitDays) / p.orbitDays * (Math.PI * 2);
                        createBody(p.name, p.radius, p.dist, currentAngle, p.color, false);
                    });
                }

                initSolarSystem();

                // ==========================================
                // 黑洞 & 白洞（火星与土星轨道带，太阳对侧对称）
                // ==========================================
                const MARS_ORBIT = 65;
                const SATURN_ORBIT = 135;
                const WORMHOLE_DIST = (MARS_ORBIT + SATURN_ORBIT) * 0.5;
                const WORMHOLE_ANGLE = Math.PI / 5;
                const WORMHOLE_CORE_RADIUS = 4.5;
                const WORMHOLE_CAPTURE_RADIUS = 7;
                const WHITE_HOLE_REPULSE_RADIUS = 42;
                const WHITE_HOLE_REPULSE_STRENGTH = 120000;

                const wormholePair = {
                    black: { position: new THREE.Vector3() },
                    white: { position: new THREE.Vector3() }
                };

                wormholePair.black.position.set(
                    WORMHOLE_DIST * Math.cos(WORMHOLE_ANGLE),
                    0,
                    WORMHOLE_DIST * Math.sin(WORMHOLE_ANGLE)
                );
                wormholePair.white.position.set(
                    -wormholePair.black.position.x,
                    0,
                    -wormholePair.black.position.z
                );

                function createWormholeVisuals() {
                    const bhGroup = new THREE.Group();
                    bhGroup.position.copy(wormholePair.black.position);

                    const bhCore = new THREE.Mesh(
                        new THREE.SphereGeometry(WORMHOLE_CORE_RADIUS * 0.55, 32, 32),
                        new THREE.MeshBasicMaterial({ color: 0x000000 })
                    );
                    bhGroup.add(bhCore);

                    const bhDisk = new THREE.Mesh(
                        new THREE.TorusGeometry(WORMHOLE_CORE_RADIUS * 1.6, 0.35, 16, 64),
                        new THREE.MeshBasicMaterial({ color: 0x9933ff, transparent: true, opacity: 0.85 })
                    );
                    bhDisk.rotation.x = Math.PI / 2.3;
                    bhGroup.add(bhDisk);

                    const bhOuterDisk = new THREE.Mesh(
                        new THREE.TorusGeometry(WORMHOLE_CORE_RADIUS * 2.2, 0.2, 12, 64),
                        new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.45 })
                    );
                    bhOuterDisk.rotation.x = Math.PI / 2.3;
                    bhGroup.add(bhOuterDisk);

                    const bhGlow = new THREE.Mesh(
                        new THREE.SphereGeometry(WORMHOLE_CORE_RADIUS * 1.8, 24, 24),
                        new THREE.MeshBasicMaterial({ color: 0x220044, transparent: true, opacity: 0.25, side: THREE.BackSide })
                    );
                    bhGroup.add(bhGlow);

                    scene.add(bhGroup);
                    wormholePair.black.group = bhGroup;
                    wormholePair.black.disk = bhDisk;
                    wormholePair.black.outerDisk = bhOuterDisk;

                    const whGroup = new THREE.Group();
                    whGroup.position.copy(wormholePair.white.position);

                    const whCore = new THREE.Mesh(
                        new THREE.SphereGeometry(WORMHOLE_CORE_RADIUS * 0.7, 32, 32),
                        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 })
                    );
                    whGroup.add(whCore);

                    const whGlow = new THREE.Mesh(
                        new THREE.SphereGeometry(WORMHOLE_CORE_RADIUS * 2.5, 24, 24),
                        new THREE.MeshBasicMaterial({ color: 0xaaccff, transparent: true, opacity: 0.18, side: THREE.BackSide })
                    );
                    whGroup.add(whGlow);

                    const whRing = new THREE.Mesh(
                        new THREE.TorusGeometry(WORMHOLE_CORE_RADIUS * 1.4, 0.25, 16, 48),
                        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
                    );
                    whRing.rotation.x = Math.PI / 2;
                    whGroup.add(whRing);

                    const whLight = new THREE.PointLight(0xffffff, 2.2, 120);
                    whGroup.add(whLight);

                    const whRepulseField = new THREE.Mesh(
                        new THREE.SphereGeometry(WHITE_HOLE_REPULSE_RADIUS, 32, 32),
                        new THREE.MeshBasicMaterial({
                            color: 0xffffff, transparent: true, opacity: 0.04, wireframe: true
                        })
                    );
                    whGroup.add(whRepulseField);
                    wormholePair.white.repulseField = whRepulseField;

                    scene.add(whGroup);
                    wormholePair.white.group = whGroup;
                    wormholePair.white.core = whCore;
                    wormholePair.white.glow = whGlow;
                    wormholePair.white.ring = whRing;
                    wormholePair.white.light = whLight;

                    // 标记虫洞所在轨道带（火星—土星之间）
                    const wormholeBandGeo = new THREE.RingGeometry(MARS_ORBIT - 0.2, SATURN_ORBIT + 0.2, 96);
                    const wormholeBandMat = new THREE.MeshBasicMaterial({
                        color: 0x8844ff, transparent: true, opacity: 0.06, side: THREE.DoubleSide
                    });
                    const wormholeBand = new THREE.Mesh(wormholeBandGeo, wormholeBandMat);
                    wormholeBand.rotation.x = Math.PI / 2;
                    scene.add(wormholeBand);
                }

                createWormholeVisuals();

                const teleportCooldowns = new Map();
                const TELEPORT_COOLDOWN = 1.2;
                const _bhPos = new THREE.Vector3();
                const _whPos = new THREE.Vector3();
                const _ejectDir = new THREE.Vector3();
                const _repulseDir = new THREE.Vector3();
                const _sunForce = new CANNON.Vec3();
                const _repulseForce = new CANNON.Vec3();
                const burningPlanets = [];

                function applyWhiteHoleRepulsion(p) {
                    if (p.isSun) return;

                    _whPos.copy(wormholePair.white.position);
                    _repulseDir.set(
                        p.body.position.x - _whPos.x,
                        p.body.position.y - _whPos.y,
                        p.body.position.z - _whPos.z
                    );
                    const dist = _repulseDir.length();
                    if (dist >= WHITE_HOLE_REPULSE_RADIUS || dist < 0.5) return;

                    const falloff = 1 - dist / WHITE_HOLE_REPULSE_RADIUS;
                    const strength = WHITE_HOLE_REPULSE_STRENGTH * falloff * falloff;
                    _repulseDir.multiplyScalar(strength / dist);

                    if (p.orbitMode) {
                        p.orbitMode = false;
                        p.body.type = CANNON.Body.DYNAMIC;
                    }

                    p.body.applyForce(
                        _repulseForce.set(_repulseDir.x, _repulseDir.y, _repulseDir.z),
                        p.body.position
                    );
                }

                function updateOrbitalPlanets(dt) {
                    planets.forEach(p => {
                        if (p.isSun || !p.orbitMode || p === selectedPlanet || p.burning) return;

                        p.orbitAngle += p.orbitSpeed * dt;
                        const d = p.orbitDist;
                        const x = d * Math.cos(p.orbitAngle);
                        const z = d * Math.sin(p.orbitAngle);
                        const speed = Math.sqrt((G * SUN_MASS) / d);

                        p.body.position.set(x, 0, z);
                        p.body.velocity.set(-speed * Math.sin(p.orbitAngle), 0, speed * Math.cos(p.orbitAngle));
                        p.body.angularVelocity.set(0, 0, 0);
                    });
                }

                function applySunGravity(dt) {
                    planets.forEach(p => {
                        if (p.isSun || p.orbitMode || p === selectedPlanet || p.burning) return;

                        _sunForce.set(0, 0, 0);
                        sunBodyRef.position.vsub(p.body.position, _sunForce);
                        const distanceSq = _sunForce.lengthSquared();
                        if (distanceSq > 0.5) {
                            _sunForce.normalize();
                            const strength = (G * p.body.mass * SUN_MASS) / distanceSq;
                            _sunForce.scale(strength, _sunForce);
                            p.body.applyForce(_sunForce, p.body.position);
                        }
                    });
                }

                function destroyPlanet(planet) {
                    if (planet.burning) return;
                    planet.burning = true;

                    if (planet === selectedPlanet) {
                        hideAimVisual();
                        selectedPlanet = null;
                        isDragging = false;
                        hasValidDragPos = false;
                        activePointerId = null;
                        controls.enabled = true;
                        renderer.domElement.style.cursor = 'default';
                    }

                    teleportCooldowns.delete(planet);
                    world.removeBody(planet.body);

                    burningPlanets.push({
                        planet,
                        life: 0.6,
                        maxLife: 0.6
                    });
                }

                function updateBurningPlanets(dt) {
                    for (let i = burningPlanets.length - 1; i >= 0; i--) {
                        const burn = burningPlanets[i];
                        burn.life -= dt;
                        const t = 1 - burn.life / burn.maxLife;
                        const scale = 1 + t * 2.5;
                        burn.planet.mesh.scale.setScalar(scale);
                        burn.planet.mesh.material.emissive.setHex(0xff4400);
                        burn.planet.mesh.material.emissiveIntensity = 1.5 * (1 - t);
                        burn.planet.mesh.material.opacity = Math.max(0, 1 - t * 1.2);
                        burn.planet.mesh.material.transparent = true;

                        if (burn.life <= 0) {
                            scene.remove(burn.planet.mesh);
                            const idx = planets.indexOf(burn.planet);
                            if (idx !== -1) planets.splice(idx, 1);
                            burningPlanets.splice(i, 1);
                        }
                    }
                }

                function checkSunIncineration() {
                    planets.forEach(p => {
                        if (p.isSun || p === selectedPlanet || p.burning) return;

                        const pr = p.mesh.geometry.parameters.radius;
                        const dx = p.body.position.x;
                        const dy = p.body.position.y;
                        const dz = p.body.position.z;
                        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (dist < SUN_RADIUS + pr * 0.65) {
                            destroyPlanet(p);
                        }
                    });
                }

                function updateSunVisual(elapsed) {
                    if (!sunMeshRef) return;
                    const pulse = 1 + Math.sin(elapsed * 2.2) * 0.04;
                    sunMeshRef.scale.setScalar(pulse);
                    sunLight.intensity = 2.5 + Math.sin(elapsed * 3) * 0.5;
                }

                function updateWormholeVisuals(elapsed) {
                    if (wormholePair.black.disk) {
                        wormholePair.black.disk.rotation.z += 0.025;
                        wormholePair.black.outerDisk.rotation.z -= 0.015;
                    }
                    if (wormholePair.white.core) {
                        const pulse = 0.85 + Math.sin(elapsed * 4) * 0.15;
                        wormholePair.white.core.scale.setScalar(pulse);
                        wormholePair.white.glow.scale.setScalar(1 + Math.sin(elapsed * 3) * 0.08);
                        wormholePair.white.ring.rotation.z += 0.012;
                        wormholePair.white.light.intensity = 1.8 + Math.sin(elapsed * 5) * 0.6;
                        if (wormholePair.white.repulseField) {
                            wormholePair.white.repulseField.rotation.y += 0.004;
                            wormholePair.white.repulseField.material.opacity = 0.03 + Math.sin(elapsed * 2) * 0.015;
                        }
                    }
                }

                function teleportThroughWormhole(planet) {
                    _whPos.copy(wormholePair.white.position);
                    const speed = Math.max(planet.body.velocity.length(), 30);

                    _ejectDir.copy(_whPos).normalize();
                    if (_ejectDir.lengthSq() < 0.001) {
                        _ejectDir.set(0, 0, 1);
                    }

                    planet.orbitMode = false;
                    planet.body.type = CANNON.Body.DYNAMIC;

                    planet.body.position.set(_whPos.x, _whPos.y, _whPos.z);
                    planet.body.velocity.set(
                        _ejectDir.x * speed,
                        _ejectDir.y * speed,
                        _ejectDir.z * speed
                    );
                    planet.body.angularVelocity.set(
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 4
                    );
                    planet.mesh.position.copy(planet.body.position);

                    planet.mesh.material.emissive.setHex(0xffffff);
                    planet.mesh.material.emissiveIntensity = 1.5;
                    setTimeout(() => {
                        if (planet.mesh && planet.mesh.material) {
                            planet.mesh.material.emissive.setHex(0x000000);
                            planet.mesh.material.emissiveIntensity = 0;
                        }
                    }, 300);

                    teleportCooldowns.set(planet, TELEPORT_COOLDOWN);
                }

                function checkWormholeTeleports(dt) {
                    _bhPos.copy(wormholePair.black.position);

                    teleportCooldowns.forEach((time, planet) => {
                        const next = time - dt;
                        if (next <= 0) teleportCooldowns.delete(planet);
                        else teleportCooldowns.set(planet, next);
                    });

                    planets.forEach(p => {
                        if (p.isSun || p === selectedPlanet || p.burning || teleportCooldowns.has(p)) return;

                        const pr = p.mesh.geometry.parameters.radius;
                        const dx = p.body.position.x - _bhPos.x;
                        const dy = p.body.position.y - _bhPos.y;
                        const dz = p.body.position.z - _bhPos.z;
                        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (dist < WORMHOLE_CAPTURE_RADIUS + pr * 0.5) {
                            teleportThroughWormhole(p);
                        }
                    });
                }

                // ==========================================
                // 瞄准线 & 力度环可视化
                // ==========================================
                const aimLineGeo = new THREE.BufferGeometry();
                aimLineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
                const aimLineMat = new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.95 });
                const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
                aimLine.visible = false;
                aimLine.renderOrder = 999;
                aimLine.material.depthTest = false;
                scene.add(aimLine);

                // 预测方向线（反方向，显示球将飞向哪里）
                const predictLineGeo = new THREE.BufferGeometry();
                predictLineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
                const predictLineMat = new THREE.LineBasicMaterial({ color: 0xff6644, transparent: true, opacity: 0.55 });
                const predictLine = new THREE.Line(predictLineGeo, predictLineMat);
                predictLine.visible = false;
                predictLine.renderOrder = 998;
                predictLine.material.depthTest = false;
                scene.add(predictLine);

                // 瞄准点（光标位置对应的小球）
                const aimDotGeo = new THREE.SphereGeometry(0.4, 16, 16);
                const aimDotMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
                const aimDot = new THREE.Mesh(aimDotGeo, aimDotMat);
                aimDot.visible = false;
                aimDot.renderOrder = 1000;
                aimDot.material.depthTest = false;
                scene.add(aimDot);

                // 力度环（围绕选中星球）
                const powerRingGeo = new THREE.TorusGeometry(1, 0.15, 16, 48);
                const powerRing = new THREE.Mesh(powerRingGeo, new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.8 }));
                powerRing.visible = false;
                powerRing.renderOrder = 997;
                powerRing.material.depthTest = false;
                scene.add(powerRing);

                // ==========================================
                // 交互逻辑（桌球式拉弓瞄准）
                // ==========================================
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                const dragPlane = new THREE.Plane();
                const _rayOrigin = new THREE.Vector3();
                const _rayDir = new THREE.Vector3();
                const _oc = new THREE.Vector3();

                let selectedPlanet = null;
                let dragStartPos = new THREE.Vector3();
                let currentPullVec = new THREE.Vector3();
                let isDragging = false;
                let lastValidWorldPos = new THREE.Vector3();
                let hasValidDragPos = false;
                let activePointerId = null;

                function getPowerColor(power) {
                    // green(0.33) -> yellow(0.16) -> red(0)
                    const hue = (1 - Math.min(power, 1)) * 0.33;
                    return new THREE.Color().setHSL(hue, 1, 0.5);
                }

                function updateAimVisual(cursorWorldPos, planetPos) {
                    if (!selectedPlanet) return;

                    currentPullVec.subVectors(cursorWorldPos, planetPos);
                    const pullDist = currentPullVec.length();
                    const maxPull = 35;
                    const power = Math.min(pullDist / maxPull, 1.0);

                    // 选中星球视觉放大，营造"抓住"的感觉
                    const baseRadius = selectedPlanet.mesh.geometry.parameters.radius;
                    selectedPlanet.mesh.scale.setScalar(1 + power * 0.25);

                    // 力度环
                    powerRing.visible = true;
                    powerRing.position.copy(planetPos);
                    const ringRadius = baseRadius * 1.8 + power * 6;
                    powerRing.scale.setScalar(ringRadius);
                    powerRing.material.color.copy(getPowerColor(power));
                    powerRing.material.opacity = 0.6 + power * 0.4;
                    powerRing.lookAt(camera.position);

                    // 瞄准线: 星球 → 光标
                    const positions = aimLine.geometry.attributes.position.array;
                    positions[0] = planetPos.x; positions[1] = planetPos.y; positions[2] = planetPos.z;
                    positions[3] = cursorWorldPos.x; positions[4] = cursorWorldPos.y; positions[5] = cursorWorldPos.z;
                    aimLine.geometry.attributes.position.needsUpdate = true;
                    aimLine.visible = true;
                    aimLine.material.color.copy(getPowerColor(power));

                    // 预测线: 星球 → 发射方向（拉弓反方向）
                    if (pullDist > 0.5) {
                        const shootDir = currentPullVec.clone().normalize().multiplyScalar(-1);
                        const predictLen = power * 30;
                        const predictEnd = planetPos.clone().add(shootDir.clone().multiplyScalar(predictLen));
                        const pPositions = predictLine.geometry.attributes.position.array;
                        pPositions[0] = planetPos.x; pPositions[1] = planetPos.y; pPositions[2] = planetPos.z;
                        pPositions[3] = predictEnd.x; pPositions[4] = predictEnd.y; pPositions[5] = predictEnd.z;
                        predictLine.geometry.attributes.position.needsUpdate = true;
                        predictLine.visible = true;
                        predictLine.material.color.copy(getPowerColor(power));
                    } else {
                        predictLine.visible = false;
                    }

                    // 瞄准点
                    aimDot.position.copy(cursorWorldPos);
                    aimDot.visible = true;
                    aimDot.material.color.copy(getPowerColor(power));

                    // 星球高亮 - 拉得越远越亮
                    selectedPlanet.mesh.material.emissive.setHex(0x666666);
                    selectedPlanet.mesh.material.emissiveIntensity = 0.2 + power * 0.8;
                }

                function hideAimVisual() {
                    aimLine.visible = false;
                    predictLine.visible = false;
                    aimDot.visible = false;
                    powerRing.visible = false;
                    if (selectedPlanet) {
                        selectedPlanet.mesh.material.emissive.setHex(0x000000);
                        selectedPlanet.mesh.material.emissiveIntensity = 0;
                        selectedPlanet.mesh.scale.setScalar(1);
                    }
                }

                function updateMouseFromEvent(e) {
                    const rect = renderer.domElement.getBoundingClientRect();
                    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                }

                // 放大拾取半径：远处的小星球用 mesh 射线几乎点不中
                function getPlanetAtMouse(e) {
                    updateMouseFromEvent(e);
                    raycaster.setFromCamera(mouse, camera);
                    _rayOrigin.copy(raycaster.ray.origin);
                    _rayDir.copy(raycaster.ray.direction).normalize();

                    let closest = null;
                    let closestT = Infinity;

                    planets.forEach(p => {
                        if (p.isSun || p.burning) return;
                        const center = p.body.position;
                        const visualRadius = p.mesh.geometry.parameters.radius;
                        const pickRadius = Math.max(visualRadius * 5, 4);

                        _oc.subVectors(_rayOrigin, center);
                        const b = 2 * _oc.dot(_rayDir);
                        const c = _oc.dot(_oc) - pickRadius * pickRadius;
                        const disc = b * b - 4 * c;
                        if (disc < 0) return;

                        const sqrtDisc = Math.sqrt(disc);
                        let t = (-b - sqrtDisc) * 0.5;
                        if (t < 0) t = (-b + sqrtDisc) * 0.5;
                        if (t < 0 || t >= closestT) return;

                        closestT = t;
                        closest = p;
                    });

                    return closest;
                }

                function getWorldPosAtMouse(e, planetPos) {
                    updateMouseFromEvent(e);
                    raycaster.setFromCamera(mouse, camera);

                    // 使用 XZ 水平面(Y轴朝上)，使拖拽方向与鼠标移动直觉一致
                    const up = new THREE.Vector3(0, 1, 0);
                    const camDir = camera.getWorldDirection(new THREE.Vector3());
                    const dp = Math.abs(camDir.dot(up)); // 相机方向与垂直方向的点积

                    if (dp > 0.98) {
                        // 接近顶视角，水平面近乎平行于射线，改用相机朝向平面
                        dragPlane.setFromNormalAndCoplanarPoint(camDir, planetPos);
                    } else if (dp < 0.05) {
                        // 接近平视，水平面近乎与射线方向平行，改用相机朝向平面
                        dragPlane.setFromNormalAndCoplanarPoint(camDir, planetPos);
                    } else {
                        // 正常情况：使用水平面，穿过星球位置
                        dragPlane.setFromNormalAndCoplanarPoint(up, planetPos);
                    }

                    const pt = new THREE.Vector3();
                    const hit = raycaster.ray.intersectPlane(dragPlane, pt);
                    if (!hit) return null;

                    // 限制拖拽距离，防止极端值
                    const maxDrag = 50;
                    if (pt.distanceTo(planetPos) > maxDrag) {
                        const dir = pt.clone().sub(planetPos).normalize();
                        pt.copy(planetPos).add(dir.multiplyScalar(maxDrag));
                    }
                    return pt;
                }

                function beginPlanetDrag(e, planet) {
                    selectedPlanet = planet;
                    isDragging = true;
                    hasValidDragPos = false;
                    activePointerId = e.pointerId;
                    controls.enabled = false;
                    renderer.domElement.style.cursor = 'grabbing';

                    if (selectedPlanet.body.mass > 0) {
                        selectedPlanet.body.type = CANNON.Body.KINEMATIC;
                        selectedPlanet.body.velocity.set(0, 0, 0);
                        selectedPlanet.body.angularVelocity.set(0, 0, 0);
                    }

                    dragStartPos.copy(selectedPlanet.body.position);
                    selectedPlanet.originalPosition = dragStartPos.clone();

                    const worldPos = getWorldPosAtMouse(e, dragStartPos);
                    if (worldPos) {
                        hasValidDragPos = true;
                        lastValidWorldPos.copy(worldPos);
                        updateAimVisual(worldPos, selectedPlanet.originalPosition);
                    }

                    try {
                        renderer.domElement.setPointerCapture(e.pointerId);
                    } catch (_) { /* 旧浏览器忽略 */ }
                }

                function updatePlanetDrag(e) {
                    if (!isDragging || !selectedPlanet) return;

                    const worldPos = getWorldPosAtMouse(e, selectedPlanet.originalPosition);
                    if (worldPos) {
                        hasValidDragPos = true;
                        lastValidWorldPos.copy(worldPos);

                        const offset = new THREE.Vector3().subVectors(worldPos, selectedPlanet.originalPosition);
                        const maxVisualPull = 35;
                        if (offset.length() > maxVisualPull) {
                            offset.normalize().multiplyScalar(maxVisualPull);
                        }

                        const displacedPos = selectedPlanet.originalPosition.clone().add(offset);
                        selectedPlanet.mesh.position.copy(displacedPos);
                        selectedPlanet.body.position.copy(displacedPos);

                        updateAimVisual(worldPos, selectedPlanet.originalPosition);
                    } else if (hasValidDragPos) {
                        updateAimVisual(lastValidWorldPos, selectedPlanet.originalPosition);
                    }
                }

                function endPlanetDrag(e) {
                    if (!isDragging || !selectedPlanet) return;

                    const origPos = selectedPlanet.originalPosition.clone();
                    let worldPos = getWorldPosAtMouse(e, origPos);
                    if (!worldPos && hasValidDragPos) {
                        worldPos = lastValidWorldPos.clone();
                    }

                    if (worldPos && selectedPlanet.body.mass > 0) {
                        const pullVec = new THREE.Vector3().subVectors(worldPos, origPos);
                        const pullDist = pullVec.length();
                        const minPull = 0.8;

                        if (pullDist >= minPull) {
                            const shootDir = pullVec.clone().normalize().multiplyScalar(-1);
                            const maxPull = 35;
                            const power = Math.min(pullDist / maxPull, 1.0);
                            const maxSpeed = 250;
                            const speed = Math.max(power * maxSpeed, 15);

                            selectedPlanet.mesh.position.copy(origPos);
                            selectedPlanet.body.position.copy(origPos);

                            selectedPlanet.orbitMode = false;
                            selectedPlanet.body.type = CANNON.Body.DYNAMIC;
                            selectedPlanet.body.velocity.set(
                                shootDir.x * speed,
                                shootDir.y * speed,
                                shootDir.z * speed
                            );
                            selectedPlanet.body.angularVelocity.set(
                                (Math.random() - 0.5) * 5,
                                (Math.random() - 0.5) * 5,
                                (Math.random() - 0.5) * 5
                            );
                        } else {
                            selectedPlanet.mesh.position.copy(origPos);
                            selectedPlanet.body.position.copy(origPos);
                            selectedPlanet.orbitAngle = Math.atan2(origPos.z, origPos.x);
                            selectedPlanet.orbitMode = true;
                            selectedPlanet.body.type = CANNON.Body.KINEMATIC;
                            selectedPlanet.body.velocity.set(0, 0, 0);
                            selectedPlanet.body.angularVelocity.set(0, 0, 0);
                        }
                    }

                    try {
                        if (activePointerId !== null) {
                            renderer.domElement.releasePointerCapture(activePointerId);
                        }
                    } catch (_) { /* ignore */ }

                    hideAimVisual();
                    selectedPlanet = null;
                    isDragging = false;
                    hasValidDragPos = false;
                    activePointerId = null;
                    controls.enabled = true;
                    renderer.domElement.style.cursor = 'default';
                }

                renderer.domElement.addEventListener('pointermove', (e) => {
                    if (isDragging) {
                        if (activePointerId !== null && e.pointerId !== activePointerId) return;
                        updatePlanetDrag(e);
                        return;
                    }
                    const planet = getPlanetAtMouse(e);
                    renderer.domElement.style.cursor = planet ? 'grab' : 'default';
                });

                renderer.domElement.addEventListener('pointerdown', (e) => {
                    if (e.button !== 0) return;

                    const planet = getPlanetAtMouse(e);
                    if (!planet) return;

                    e.preventDefault();
                    e.stopImmediatePropagation();

                    beginPlanetDrag(e, planet);
                }, true);

                renderer.domElement.addEventListener('pointerup', (e) => {
                    if (!isDragging) return;
                    if (activePointerId !== null && e.pointerId !== activePointerId) return;
                    e.preventDefault();
                    endPlanetDrag(e);
                });

                renderer.domElement.addEventListener('pointercancel', (e) => {
                    if (!isDragging) return;
                    endPlanetDrag(e);
                });

                window.addEventListener('pointerup', (e) => {
                    if (!isDragging) return;
                    if (activePointerId !== null && e.pointerId !== activePointerId) return;
                    endPlanetDrag(e);
                });

                // ==========================================
                // 动画循环
                // ==========================================
                const clock = new THREE.Clock();
                let elapsedTime = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    const dt = Math.min(clock.getDelta(), 0.1);
                    elapsedTime += dt;

                    updateOrbitalPlanets(dt);
                    applySunGravity(dt);

                    planets.forEach(p => {
                        if (p.isSun || p === selectedPlanet || p.burning) return;
                        applyWhiteHoleRepulsion(p);
                    });

                    world.step(1 / 60, dt, 3);

                    checkSunIncineration();
                    checkWormholeTeleports(dt);
                    updateWormholeVisuals(elapsedTime);
                    updateBurningPlanets(dt);
                    updateSunVisual(elapsedTime);

                    // 同步 Three.js 和 Cannon.js（拖拽中由指针事件驱动，避免被物理步覆盖）
                    planets.forEach(p => {
                        if (p.burning) return;
                        if (p === selectedPlanet && isDragging) return;
                        p.mesh.position.copy(p.body.position);
                        p.mesh.quaternion.copy(p.body.quaternion);
                    });

                    // 星空缓慢旋转
                    starMesh.rotation.y += 0.00005;

                    controls.update();
                    renderer.render(scene, camera);
                }

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                animate();

            } catch (err) {
                const errorUI = document.createElement('div');
                errorUI.style.cssText = `
                    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: rgba(20, 0, 0, 0.95); border: 2px solid #ff4444; border-radius: 12px;
                    padding: 30px; color: #fff; text-align: center; font-family: sans-serif;
                    box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4); z-index: 100; min-width: 300px;
                `;
                errorUI.innerHTML = `
                    <h2 style="color:#ff4444; margin-top:0;">渲染失败</h2>
                    <p style="font-size: 15px;">网络无法加载 3D 引擎文件或浏览器安全设置拦截了脚本。</p>
                    <div style="background:#000; padding:12px; color:#00ff00; font-family:monospace; text-align:left; overflow:auto; border-radius:6px; margin: 15px 0;">
                        <b>错误信息:</b><br>${err.message}
                    </div>
                    <p style="color:#aaa; font-size: 13px; margin-bottom:0; line-height:1.6;">
                        1. 暂时关闭广告拦截插件<br>
                        2. 检查网络或切换代理/VPN<br>
                        3. 按 F12 查看控制台
                    </p>
                `;
                document.body.appendChild(errorUI);
                const statusEl = document.getElementById('sys-status');
                if (statusEl) {
                    statusEl.innerHTML = "引擎加载失败";
                    statusEl.style.color = "red";
                }
            }
        };
    </script>
</body>
</html>
